name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      # Build JS for npm publish
      - name: Build JS
        run: |
          cd packages/shared && bun run build
          cd ../server && bun run build
          cd ../cli && bun run build
          cd ../kon && bun run build

      # Build compiled binaries
      - name: Build binaries
        run: |
          cd packages/kon
          bun build --compile --target bun-linux-x64 src/index.ts --outfile dist/kon-linux-x64
          cd ../cli
          bun build --compile --target bun-darwin-arm64 src/index.ts --outfile dist/kond-darwin-arm64
          bun build --compile --target bun-darwin-x64 src/index.ts --outfile dist/kond-darwin-x64
          bun build --compile --target bun-linux-x64 src/index.ts --outfile dist/kond-linux-x64

      # Print SHA256s for Homebrew formula
      - name: SHA256 checksums
        run: |
          sha256sum packages/kon/dist/kon-linux-x64
          sha256sum packages/cli/dist/kond-darwin-arm64
          sha256sum packages/cli/dist/kond-darwin-x64
          sha256sum packages/cli/dist/kond-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/kon/dist/kon-linux-x64
            packages/cli/dist/kond-darwin-arm64
            packages/cli/dist/kond-darwin-x64
            packages/cli/dist/kond-linux-x64

      # Publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish kond
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish kon
        run: cd packages/kon && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

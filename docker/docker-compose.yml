services:
  kond:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "7443:7443"
    volumes:
      - ./data:/data
    environment:
      - KON_MODE=server
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7443/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
